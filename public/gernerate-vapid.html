<!DOCTYPE html>
<html>
<head>
  <title>Generate VAPID keys</title>
  <style>
    body { font-family: sans-serif; padding: 32px; max-width: 700px; }
    pre { background: #f5f5f5; padding: 16px; border-radius: 8px; word-break: break-all; white-space: pre-wrap; font-size: 13px; }
    .label { font-weight: bold; margin-top: 20px; display: block; }
    .warn { color: #b6452c; font-size: 13px; }
    button { margin-top: 16px; padding: 10px 20px; background: #c8862e; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
<h2>VAPID Key Generator</h2>
<p>Generates keys using your browser's built-in Web Crypto API — no Node.js needed.</p>
<button onclick="generate()">Generate keys</button>
<div id="output"></div>

<script>
async function generate() {
  // Generate a P-256 ECDH key pair (same curve VAPID requires)
  const keyPair = await crypto.subtle.generateKey(
    { name: 'ECDH', namedCurve: 'P-256' },
    true,
    ['deriveKey', 'deriveBits']
  );

  // Public key: raw uncompressed EC point (65 bytes) → base64url
  const pubRaw = await crypto.subtle.exportKey('raw', keyPair.publicKey);
  const publicKey = toBase64url(new Uint8Array(pubRaw));

  // Private key: JWK → extract 'd' field (raw scalar, already base64url)
  const privJwk = await crypto.subtle.exportKey('jwk', keyPair.privateKey);
  const privateKey = privJwk.d;

  const output = document.getElementById('output');
  output.innerHTML = `
    <span class="label">Public key (add to Cloudflare environment variables as VITE_VAPID_PUBLIC_KEY):</span>
    <pre>${publicKey}</pre>

    <span class="label">Private key (add to Supabase secrets ONLY as VAPID_PRIVATE_KEY — never put this in frontend code):</span>
    <pre>${privateKey}</pre>

    <span class="label">Copy both for Supabase secrets (run these in Supabase CLI):</span>
    <pre>supabase secrets set VAPID_PUBLIC_KEY=${publicKey}
supabase secrets set VAPID_PRIVATE_KEY=${privateKey}
supabase secrets set VAPID_EMAIL=mailto:you@yourdomain.com</pre>

    <span class="label">Copy this for Cloudflare environment variables:</span>
    <pre>VITE_VAPID_PUBLIC_KEY=${publicKey}</pre>

    <p class="warn">⚠ Save both keys somewhere safe — you cannot regenerate these. If you lose them you'll need to re-subscribe all users.</p>
    <p class="warn">⚠ Never commit either key to GitHub. The public key goes in Cloudflare's dashboard, the private key in Supabase secrets only.</p>
  `;
}

function toBase64url(bytes) {
  let binary = '';
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
</script>
</body>
</html>
